<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stillwater Command Center</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{
  color-scheme: light;
  --bg-primary:#FFFFFF;
  --bg-secondary:#FCFCFC;
  --bg-tertiary:#F4F4F4;
  --bg-quaternary:#EBEBEB;
  --border-light:#F1F1F1;
  --border-medium:#EBEBEB;
  --border-strong:#D6D6D6;
  --text-primary:#333333;
  --text-secondary:#666666;
  --text-tertiary:#999999;
  --text-light:#B3B3B3;
  --accent:#3E63DD;
  --accent-hover:#3A5BC7;
  --accent-bg:#EAF1FF;
  --font:'Inter','SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --r-sm:4px; --r-md:8px;
  --shadow:0 2px 4px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg:0 8px 28px rgba(0,0,0,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);font-size:13px;color:var(--text-primary);background:var(--bg-primary);-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:6px;border:3px solid var(--bg-primary)}
::-webkit-scrollbar-track{background:transparent}

/* ===== Layout ===== */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:236px;min-width:236px;background:var(--bg-secondary);border-right:1px solid var(--border-medium);display:flex;flex-direction:column;padding:12px 8px;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-primary)}

/* workspace switcher */
.ws{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer}
.ws:hover{background:var(--bg-tertiary)}
.ws-logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#3E63DD,#5b7bf0);color:#fff;font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ws-name{font-weight:600;font-size:13.5px;color:var(--text-primary)}
.ws .chev{margin-left:auto;color:var(--text-tertiary)}

.search{display:flex;align-items:center;gap:8px;margin:10px 4px 6px;padding:5px 8px;border-radius:var(--r-sm);color:var(--text-tertiary);cursor:pointer}
.search:hover{background:var(--bg-tertiary)}
.search .kbd{margin-left:auto;font-size:11px;color:var(--text-light);border:1px solid var(--border-medium);border-radius:4px;padding:0 5px;background:var(--bg-primary)}

.nav-section{margin-top:12px}
.nav-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-light);padding:6px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:var(--r-sm);color:var(--text-secondary);font-size:13px;cursor:pointer;user-select:none;position:relative}
.nav-item:hover{background:var(--bg-tertiary)}
.nav-item.active{background:var(--bg-quaternary);color:var(--text-primary);font-weight:500}
.nav-item svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0}
.nav-item .count{margin-left:auto;font-size:11px;color:var(--text-tertiary);background:var(--bg-primary);border:1px solid var(--border-medium);border-radius:10px;padding:0 6px;min-width:18px;text-align:center}

/* top bar */
.topbar{height:52px;min-height:52px;border-bottom:1px solid var(--border-medium);display:flex;align-items:center;padding:0 20px;gap:10px}
.crumb{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
.crumb svg{width:17px;height:17px;stroke:var(--text-secondary)}
.topbar .spacer{flex:1}
.content{flex:1;overflow-y:auto;padding:20px 24px 60px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 11px;border-radius:var(--r-sm);border:1px solid var(--border-strong);background:var(--bg-primary);color:var(--text-primary);font-size:13px;font-weight:500}
.btn:hover{background:var(--bg-tertiary)}
.btn svg{width:15px;height:15px;stroke:currentColor}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-hover)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text-secondary)}
.btn.ghost:hover{background:var(--bg-tertiary)}
.btn.sm{height:26px;padding:0 8px;font-size:12px}
.btn.danger{color:#CE2C31;border-color:var(--border-medium)}
.btn.danger:hover{background:#FEEBEC}

/* table */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tinput{height:30px;border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:0 10px;background:var(--bg-primary);color:var(--text-primary);width:230px}
.tinput::placeholder{color:var(--text-light)}
.tinput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.tablewrap{border:1px solid var(--border-medium);border-radius:var(--r-md);overflow:hidden;background:var(--bg-primary)}
table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th{text-align:left;font-weight:500;color:var(--text-secondary);font-size:12px;padding:9px 12px;border-bottom:1px solid var(--border-medium);background:var(--bg-secondary);white-space:nowrap;position:sticky;top:0}
table.grid td{padding:8px 12px;border-bottom:1px solid var(--border-light);white-space:nowrap;color:var(--text-primary)}
table.grid tr:last-child td{border-bottom:none}
table.grid tbody tr:hover{background:var(--bg-secondary)}
table.grid tbody tr{cursor:default}
.row-actions{display:flex;gap:4px;opacity:0;transition:opacity .1s}
tr:hover .row-actions{opacity:1}
.iconbtn{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:var(--text-tertiary)}
.iconbtn:hover{background:var(--bg-quaternary);color:var(--text-primary)}
.iconbtn svg{width:15px;height:15px;stroke:currentColor}
.check{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;vertical-align:middle}
.muted{color:var(--text-tertiary)}
.empty{padding:48px;text-align:center;color:var(--text-tertiary)}
.empty svg{width:34px;height:34px;stroke:var(--border-strong);margin-bottom:10px}

/* tags */
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:2px 8px;border-radius:4px;line-height:1.5;white-space:nowrap}
.tag .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.85}
.t-green{background:#E6F6EC;color:#1A7F50}
.t-blue{background:#EAF1FF;color:#3A5BC7}
.t-orange{background:#FFEFD9;color:#C2570C}
.t-red{background:#FEECEC;color:#CE2C31}
.t-purple{background:#F1ECFD;color:#6843C9}
.t-gray{background:#EFEFEF;color:#6B6B6B}
.t-pink{background:#FCE9F2;color:#C2298A}

/* cards / kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{border:1px solid var(--border-medium);border-radius:var(--r-md);padding:14px 16px;background:var(--bg-primary)}
.kpi .lbl{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.kpi .lbl svg{width:14px;height:14px;stroke:var(--text-tertiary)}
.kpi .val{font-size:24px;font-weight:600;margin-top:6px;letter-spacing:-.01em}
.kpi .sub{font-size:11.5px;color:var(--text-tertiary);margin-top:2px}
.section-title{font-size:13px;font-weight:600;color:var(--text-primary);margin:6px 0 10px;display:flex;align-items:center;gap:8px}
.panel{border:1px solid var(--border-medium);border-radius:var(--r-md);background:var(--bg-primary);padding:16px;margin-bottom:18px}
.chart-box{height:260px;position:relative}

/* kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.kcol{min-width:240px;width:240px;background:var(--bg-secondary);border:1px solid var(--border-medium);border-radius:var(--r-md);padding:8px;flex-shrink:0}
.kcol-h{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 8px;font-size:12px;font-weight:600;color:var(--text-secondary)}
.kcard{background:var(--bg-primary);border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:10px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.kcard:hover{border-color:var(--border-strong)}
.kcard .nm{font-weight:500;margin-bottom:4px}
.kcard .amt{color:var(--text-secondary);font-size:12.5px}

/* tasks/notes */
.tasklist{display:flex;flex-direction:column;gap:2px}
.taskrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--border-light);border-radius:var(--r-sm);background:var(--bg-primary)}
.taskrow:hover{background:var(--bg-secondary)}
.taskrow .tt{flex:1}
.taskrow.done .tt{color:var(--text-tertiary);text-decoration:line-through}
.notegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.notecard{border:1px solid var(--border-medium);border-radius:var(--r-md);padding:14px;background:var(--bg-primary);position:relative}
.notecard h4{font-size:13.5px;margin-bottom:6px}
.notecard p{color:var(--text-secondary);font-size:12.5px;white-space:pre-wrap}
.wf{border:1px solid var(--border-medium);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;background:var(--bg-primary)}
.wf-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wf-steps{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.wf-step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);background:var(--bg-tertiary);border-radius:20px;padding:3px 10px}
.wf-arrow{color:var(--text-light);align-self:center}
/* kanban DnD + quick add */
.kbody{min-height:28px}
.kcol.drop{outline:2px dashed var(--accent);outline-offset:-4px;background:var(--accent-bg)}
.kcard.dragging{opacity:.4}
.kcard.done .nm{text-decoration:line-through;color:var(--text-tertiary)}
.kcard .kmeta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.kcard .kdel{position:absolute;top:5px;right:5px;opacity:0;transition:opacity .1s}
.kcard:hover .kdel{opacity:.5}.kcard .kdel:hover{opacity:1}
.kcol-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:7px;border:1px dashed var(--border-medium);border-radius:var(--r-sm);background:transparent;color:var(--text-secondary);font-size:12.5px;cursor:pointer}
.kcol-add:hover{border-color:var(--accent);color:var(--accent)}
.kquick{width:100%;border:1px solid var(--accent);border-radius:var(--r-sm);padding:7px 9px;margin-bottom:8px;font-family:inherit;font-size:13px;box-sizing:border-box}
/* sortable headers */
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--text-primary)}
th .arrow{font-size:9px;margin-left:4px;color:var(--accent)}
/* leads selection bar */
.selbar{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.selnum{width:62px;border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:6px 8px;font-size:12.5px;background:var(--bg-primary)}
.selcount{font-size:12.5px;color:var(--accent);font-weight:600;min-width:0}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,20,20,.32);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--bg-primary);border-radius:12px;box-shadow:var(--shadow-lg);width:520px;max-width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border-medium);font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.modal-b{padding:18px 20px;overflow-y:auto}
.modal-f{padding:14px 20px;border-top:1px solid var(--border-medium);display:flex;justify-content:flex-end;gap:8px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1 / -1}
.field label{font-size:12px;color:var(--text-secondary);font-weight:500}
.field input,.field select,.field textarea{height:32px;border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:0 10px;background:var(--bg-primary);color:var(--text-primary)}
.field textarea{height:70px;padding:8px 10px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}

.banner{background:#FFF8E6;border:1px solid #F5E1A8;color:#8A6D1B;border-radius:var(--r-md);padding:10px 14px;font-size:12.5px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.iframe-wrap{border:1px solid var(--border-medium);border-radius:var(--r-md);overflow:hidden;height:calc(100vh - 150px);background:var(--bg-secondary)}
.iframe-wrap iframe{width:100%;height:100%;border:none}
.loading{display:flex;align-items:center;gap:10px;color:var(--text-tertiary);padding:40px}
.spinner{width:16px;height:16px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.seg{display:inline-flex;border:1px solid var(--border-medium);border-radius:var(--r-sm);overflow:hidden}
.seg button{height:28px;padding:0 12px;border:none;background:var(--bg-primary);color:var(--text-secondary);font-size:12.5px;border-right:1px solid var(--border-medium)}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.acct-pill{font-size:11px;color:var(--text-secondary);background:var(--bg-tertiary);border-radius:20px;padding:2px 9px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;z-index:80;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

/* avatar */
.avatar{position:relative;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0;overflow:hidden;line-height:1}
.avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.avatar .ini{position:relative;z-index:0}
.cellname{display:flex;align-items:center;gap:9px;min-width:0}
.cellname .nm{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cellname .sb{font-size:11.5px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* right slide-over drawer */
.drawer{position:fixed;inset:0;z-index:60;display:none}
.drawer.open{display:block}
.drawer-scrim{position:absolute;inset:0;background:rgba(20,20,20,.30);animation:fade .12s ease}
.drawer-panel{position:absolute;top:0;right:0;height:100%;width:460px;max-width:94vw;background:var(--bg-primary);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;animation:slidein .16s ease}
@keyframes slidein{from{transform:translateX(24px);opacity:.6}to{transform:none;opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-light)}
.drawer-head .ttl{font-weight:600;font-size:15px}
.drawer-body{flex:1;overflow-y:auto;padding:18px}
.drawer-foot{padding:12px 18px;border-top:1px solid var(--border-medium);display:flex;gap:8px;justify-content:flex-end;align-items:center}

/* detail */
.detail-hero{display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;padding:4px 0 16px}
.detail-name{font-size:19px;font-weight:600}
.detail-sub{font-size:12.5px;color:var(--text-tertiary)}
.detail-actions{display:flex;gap:8px;margin-top:4px}
.info-card{border:1px solid var(--border-medium);border-radius:var(--r-md);padding:4px 14px;margin-bottom:16px}
.info-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border-light)}
.info-row:last-child{border-bottom:none}
.info-row svg{width:16px;height:16px;stroke:var(--text-tertiary);margin-top:1px;flex-shrink:0}
.info-row .il{width:84px;color:var(--text-secondary);flex-shrink:0}
.info-row .iv{color:var(--text-primary);word-break:break-word;flex:1}
.info-note{padding:12px 2px 6px;border-top:1px solid var(--border-light)}
.info-note .il{display:flex;align-items:center;gap:9px;color:var(--text-secondary);margin-bottom:8px;font-weight:500}
.info-note .il svg{width:16px;height:16px;stroke:var(--text-tertiary)}
.detail-sec{margin-top:6px}
.detail-sec h4{font-size:13px;font-weight:600;margin:0 0 12px}
.qa-item{padding:0 0 13px}
.qa-q{color:var(--text-secondary);font-size:12.5px;margin-bottom:2px}
.qa-a{color:var(--text-primary);font-weight:500}
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:6px;top:6px;bottom:8px;width:1.5px;background:var(--border-medium)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-24px;top:1px;width:13px;height:13px;border-radius:50%;background:var(--bg-primary);border:2px solid var(--border-strong)}
.tl-title{font-weight:500}
.tl-meta{font-size:11.5px;color:var(--text-tertiary);margin-top:2px}
.form-col{display:flex;flex-direction:column;gap:14px}
.form-col .field label{font-weight:500}
.av-prev{display:flex;justify-content:center;padding:2px 0 12px}
.edit{cursor:text;border-radius:4px;padding:1px 5px;margin:-1px -5px;display:inline-block;max-width:100%;transition:background .1s}
.edit:hover{background:var(--bg-tertiary);box-shadow:inset 0 0 0 1px var(--border-medium)}
.edit[data-type="textarea"]{display:block;white-space:pre-wrap;min-height:22px}
.edit[data-type="select"],.edit[data-type="badge"]{cursor:pointer}
.edit-input{font-family:inherit;font-size:13px;border:1px solid var(--accent);border-radius:4px;padding:3px 6px;background:var(--bg-primary);color:var(--text-primary);width:100%;box-shadow:0 0 0 2px var(--accent-bg);outline:none}
textarea.edit-input{resize:vertical;min-height:64px}
.act-box{border:1px solid var(--border-medium);border-radius:var(--r-md);padding:10px;margin-bottom:14px;background:var(--bg-secondary)}
.act-types{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.act-chip{height:26px;padding:0 12px;border-radius:20px;border:1px solid var(--border-medium);background:var(--bg-primary);color:var(--text-secondary);font-size:12.5px}
.act-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.act-subj{width:100%;height:30px;border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:0 10px;margin-bottom:8px;background:var(--bg-primary);color:var(--text-primary)}
.act-body{width:100%;min-height:62px;border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:8px 10px;resize:vertical;margin-bottom:8px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit;font-size:13px}
.act-subj::placeholder,.act-body::placeholder{color:var(--text-light)}
.act-subj:focus,.act-body:focus,.act-when:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.act-row{display:flex;gap:8px;align-items:center}
.act-when{height:30px;border:1px solid var(--border-medium);border-radius:var(--r-sm);padding:0 8px;background:var(--bg-primary);color:var(--text-secondary);flex:1}
.act-badge{display:inline-block;font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px;margin-right:6px;vertical-align:middle}
.act-body-disp{color:var(--text-secondary);font-size:12.5px;white-space:pre-wrap;margin-top:3px}
.act-del{opacity:0;transition:opacity .1s}
.tl-item:hover .act-del{opacity:.6}
.act-del:hover{opacity:1}
</style>
</head>

const $ = (s,r=document)=>r.querySelector(s);
const el = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const sqlEsc = (v)=>{ if(v===null||v===undefined||v==='') return 'NULL'; return "'"+String(v).replace(/'/g,"''")+"'"; };
const sqlNum = (v)=>{ if(v===null||v===undefined||v==='') return 'NULL'; const n=Number(v); return isNaN(n)?'NULL':String(n); };
const htmlEsc = (v)=> String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtMoney = (n)=> 'CA$'+(Number(n)||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtInt = (n)=> (Number(n)||0).toLocaleString('en-CA');
const fmtDate = (s)=>{ if(!s) return ''; const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'}); };
const parseMoney = (s)=>{ if(s==null||/not available/i.test(s)) return 0; const m=String(s).replace(/[^0-9.]/g,''); const n=parseFloat(m); return isNaN(n)?0:n; };
const parseNum = parseMoney;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- MCP ---------- */
let COWORK_READY=false;
async function waitForCowork(timeoutMs=8000){
  if(COWORK_READY) return true;
  const start=Date.now();
  while(Date.now()-start<timeoutMs){
    if(window.cowork && typeof window.cowork.callMcpTool==='function'){ COWORK_READY=true; return true; }
    await new Promise(r=>setTimeout(r,150));
  }
  return !!(window.cowork && typeof window.cowork.callMcpTool==='function');
}
async function callTool(name,args){
  if(COWORK_READY || (window.cowork && typeof window.cowork.callMcpTool==='function')){
    COWORK_READY=true; return await window.cowork.callMcpTool(name,args);
  }
  const ok=await waitForCowork(1500);
  if(ok) return await window.cowork.callMcpTool(name,args);
  return await callWeb(name,args);   // standalone web (Vercel) mode
}
/* ---- standalone web mode: route bridge calls to Vercel API routes ---- */
const WEB = { token:(typeof sessionStorage!=='undefined' && sessionStorage.getItem('cc_token'))||'' };
async function callWeb(name,args){
  const isSql = (name===SB_TOOL);
  const endpoint = isSql ? '/api/sql' : '/api/meta';
  const payload  = isSql ? {query:args.query} : {tool:name, args};
  let res;
  try{ res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+WEB.token},body:JSON.stringify(payload)}); }
  catch(e){ return {isError:true, content:[{text:'Network error reaching '+endpoint}]}; }
  if(res.status===401){ promptLogin(); throw new Error('Sign in required'); }
  let data={}; try{ data=await res.json(); }catch(e){}
  if(!res.ok || (data&&data.error)) return {isError:true, content:[{text:(data&&data.error)||('HTTP '+res.status)}]};
  if(isSql) return { structuredContent:{ rows:data.rows||[] } };
  return { structuredContent:{ ad_entities:data.ad_entities||[] }, content:[{text:JSON.stringify(data)}] };
}
function promptLogin(){
  if(document.getElementById('loginOverlay')) return;
  const m=el(`<div class="overlay" id="loginOverlay"><div class="modal" style="width:360px">
    <div class="modal-h">Sign in</div>
    <div class="modal-b"><div class="field full"><label>Password</label><input id="lgpw" type="password" placeholder="Command center password" style="width:100%;box-sizing:border-box"></div><div id="lgerr" style="color:#c0392b;font-size:12.5px;margin-top:8px;display:none">Wrong password.</div></div>
    <div class="modal-f"><button class="btn primary" id="lgbtn">Sign in</button></div>
  </div></div>`);
  document.body.appendChild(m);
  const pw=m.querySelector('#lgpw'); pw.focus();
  const go=async()=>{
    let res; try{ res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw.value})}); }catch(e){ return; }
    if(res.ok){ const d=await res.json(); WEB.token=d.token||''; try{sessionStorage.setItem('cc_token',WEB.token);}catch(e){} m.remove(); renderView(); }
    else { m.querySelector('#lgerr').style.display='block'; }
  };
  m.querySelector('#lgbtn').onclick=go;
  pw.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}
function pickText(r){
  if(r==null) return '';
  if(typeof r==='string') return r;
  if(r.content && r.content[0] && typeof r.content[0].text==='string') return r.content[0].text;
  try{ return JSON.stringify(r); }catch(e){ return String(r); }
}
function parseRowsFromString(text){
  if(typeof text!=='string') return null;
  let s=text.trim();
  // execute_sql comes back DOUBLE-encoded: content[0].text is a JSON string like
  // {"result":"...<untrusted-data>...[ROWS]..."} where the row quotes are escaped.
  // Unwrap that JSON layer first, then dig into .result.
  try{
    const o=JSON.parse(s);
    if(Array.isArray(o)) return o;
    if(o && typeof o==='object'){
      if(typeof o.result==='string') return parseRowsFromString(o.result);
      if(Array.isArray(o.result)) return o.result;
      if(Array.isArray(o.rows)) return o.rows;
      if(Array.isArray(o.data)) return o.data;
    }
    if(typeof o==='string') return parseRowsFromString(o);
  }catch(e){}
  // Strip the untrusted-data wrapper (now with real quotes), then parse the array inside.
  const m=s.match(/<untrusted-data[^>]*>\s*([\s\S]*?)\s*<\/untrusted-data[^>]*>/);
  if(m) s=m[1].trim();
  try{ const v=JSON.parse(s); return Array.isArray(v)?v:[v]; }catch(e){}
  const a=s.indexOf('['), b=s.lastIndexOf(']');
  if(a!==-1&&b>a){ try{ const v=JSON.parse(s.slice(a,b+1)); return Array.isArray(v)?v:[v]; }catch(e){} }
  return null;
}
function extractRows(r){
  const cands=[];
  if(r){
    cands.push(r.structuredContent);
    if(r.structuredContent){ cands.push(r.structuredContent.result, r.structuredContent.rows, r.structuredContent.data, r.structuredContent.records); }
    if(r.content && r.content[0]) cands.push(r.content[0].text);
    cands.push(r.result, r.rows, r.data, r);
  }
  for(const c of cands){ if(Array.isArray(c)) return c; }
  for(const c of cands){
    if(typeof c==='string'){ const rows=parseRowsFromString(c); if(rows!==null) return rows; }
    if(c && typeof c.result==='string'){ const rows=parseRowsFromString(c.result); if(rows!==null) return rows; }
  }
  return [];
}
async function sb(sql){
  const r=await callTool(SB_TOOL,{project_id:SB_PROJECT, query:sql});
  if(r && r.isError) throw new Error('SQL error: '+pickText(r).slice(0,400));
  return extractRows(r);
}
function deepFindAdEntities(r){
  // returns array of ad entities from any response shape
  const texts=[];
  if(r && r.structuredContent){
    if(r.structuredContent.ad_entities!=null) { const e=r.structuredContent.ad_entities; if(Array.isArray(e)) return e; if(typeof e==='string') texts.push(e); }
    texts.push(JSON.stringify(r.structuredContent));
  }
  if(r && r.content && r.content[0] && typeof r.content[0].text==='string') texts.push(r.content[0].text);
  texts.push(pickText(r));
  for(const t of texts){
    if(typeof t!=='string') continue;
    // try to parse whole then read .ad_entities
    try{ const o=JSON.parse(t); let e=o&&o.ad_entities; if(typeof e==='string') e=JSON.parse(e); if(Array.isArray(e)) return e; if(Array.isArray(o)) return o; }catch(e){}
    // regex out an ad_entities string
    const m=t.match(/"ad_entities"\s*:\s*"((?:\\.|[^"\\])*)"/);
    if(m){ try{ const e=JSON.parse(JSON.parse('"'+m[1]+'"')); if(Array.isArray(e)) return e; }catch(e){} }
  }
  return [];
}
async function adsEntities(accountId, level, datePreset){
  const r=await callTool(ADS_TOOL,{ad_account_id:accountId, level, fields:["id","name","status","spend","impressions","clicks","cpc","ctr","reach"], date_preset:datePreset});
  if(r && r.isError) throw new Error(pickText(r).slice(0,200));
  return deepFindAdEntities(r);
}

/* ---------- tag colors ---------- */
const TAGCOLOR = {
  new:'blue', contacted:'purple', qualified:'orange', sold:'green', distributed:'green', dead:'gray',
  hot:'red', warm:'orange', cold:'blue',
  active:'green', paused:'orange', archived:'gray', draft:'gray',
  proposal:'purple', negotiation:'orange', won:'green', lost:'red',
  todo:'gray', in_progress:'blue', done:'green', high:'red', medium:'orange', low:'gray',
  life:'blue','critical illness':'purple', disability:'orange', funeral:'pink',
  meta:'blue', quiz:'purple', instapods:'pink', manual:'gray', n8n:'green',
};
const tag=(v)=> v?`<span class="tag t-${TAGCOLOR[String(v).toLowerCase()]||'gray'}"><span class="dot"></span>${htmlEsc(v)}</span>`:'<span class="muted">—</span>';

/* ---------- avatar (email photo w/ initials fallback) ---------- */
const AV_COLORS=['#b06a5b','#3E63DD','#1A7F50','#C2570C','#6843C9','#C2298A','#0E7490','#B7791F','#2563EB','#9333EA'];
function avatarColor(s){ s=String(s||'?'); let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
function initials(name){ const p=String(name||'').trim().split(/\s+/).filter(Boolean); if(!p.length) return '?'; return ((p[0][0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase(); }
function avatarHtml(name,email,size=36){
  const ini=htmlEsc(initials(name)); const bg=avatarColor(email||name); const fs=Math.round(size*0.4);
  // Try a real photo from the email (Gravatar/social via unavatar); falls back to initials if blocked/none.
  const img = email ? `<img src="https://unavatar.io/${encodeURIComponent(String(email).trim().toLowerCase())}?fallback=false" alt="" referrerpolicy="no-referrer" onerror="this.remove()">` : '';
  return `<span class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px"><span class="ini">${ini}</span>${img}</span>`;
}

/* ---------- right slide-over drawer ---------- */
function closeDrawer(){ const d=$('#drawer'); if(d){ d.classList.remove('open'); d.innerHTML=''; } if(state._dirty){ state._dirty=false; renderView(); } }
function openDrawer(title, bodyHtml, footHtml){
  let d=$('#drawer'); if(!d){ d=el('<div class="drawer" id="drawer"></div>'); document.body.appendChild(d); }
  d.innerHTML=`<div class="drawer-scrim"></div><div class="drawer-panel"><div class="drawer-head"><span class="ttl">${htmlEsc(title)}</span><button class="iconbtn" id="dwClose">✕</button></div><div class="drawer-body">${bodyHtml}</div>${footHtml?`<div class="drawer-foot">${footHtml}</div>`:''}</div>`;
  d.classList.add('open');
  d.querySelector('.drawer-scrim').onclick=closeDrawer;
  d.querySelector('#dwClose').onclick=closeDrawer;
  const panel=d.querySelector('.drawer-panel');
  panel.addEventListener('click',e=>{ const sp=e.target.closest('.edit'); if(sp&&!sp.classList.contains('editing')) startInlineEdit(sp); });
  return panel;
}
function infoRow(icon,label,valHtml){ return `<div class="info-row">${svg(icon,16)}<div class="il">${htmlEsc(label)}</div><div class="iv">${valHtml}</div></div>`; }

/* ---------- inline edit: click any value to edit (Attio-style) ---------- */
const optsOf=(key,k)=>{const f=SCHEMA[key]&&SCHEMA[key].fields.find(f=>f.k===k);return f&&f.options?f.options:null;};
function editDisplay(type,value,opts){
  if(value==null||value===''){ return '<span class="muted">—</span>'; }
  if(type==='select'||type==='badge') return tag(value);
  if(type==='money') return fmtMoney(value);
  if(type==='date') return fmtDate(value);
  return htmlEsc(value);
}
function ev(table,id,key,value,type='text',opts){
  const o=opts?(' data-opts="'+htmlEsc(JSON.stringify(opts))+'"'):'';
  const raw=value==null?'':String(value);
  return `<span class="edit" data-table="${table}" data-id="${id}" data-k="${key}" data-type="${type}" data-raw="${htmlEsc(raw)}"${o}>${editDisplay(type,value,opts)}</span>`;
}
function patchCache(table,id,k,val){
  const key=Object.keys(SCHEMA).find(kk=>SCHEMA[kk].table===table);
  if(key&&state.cache[key]){ const rec=state.cache[key].find(r=>r.id===id); if(rec) rec[k]=val; }
  state._dirty=true;
}
function startInlineEdit(span){
  if(span.classList.contains('editing')) return;
  const table=span.dataset.table, id=span.dataset.id, k=span.dataset.k, type=span.dataset.type;
  const raw=span.dataset.raw||''; const opts=span.dataset.opts?JSON.parse(span.dataset.opts):null;
  span.classList.add('editing');
  let input;
  if(type==='select'){
    input=document.createElement('select'); input.className='edit-input';
    const b=document.createElement('option'); b.value=''; b.textContent='—'; input.appendChild(b);
    (opts||[]).forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(o===raw)op.selected=true;input.appendChild(op);});
  } else if(type==='textarea'){
    input=document.createElement('textarea'); input.className='edit-input'; input.value=raw;
  } else {
    input=document.createElement('input'); input.className='edit-input';
    input.type=(type==='money'||type==='number')?'number':(type==='date'?'date':'text');
    input.value=type==='date'?(raw?String(raw).slice(0,10):''):raw;
  }
  span.innerHTML=''; span.appendChild(input); input.focus(); try{ if(input.select) input.select(); }catch(e){}
  let done=false;
  const render=(v)=>{ span.classList.remove('editing'); span.dataset.raw=(v==null?'':String(v)); span.innerHTML=editDisplay(type,(v===''||v==null)?null:v,opts); };
  const commit=async(save)=>{
    if(done) return; done=true;
    const nv=input.value;
    if(!save || nv===raw){ render(raw); return; }
    span.classList.remove('editing'); span.innerHTML='<span class="muted">saving…</span>';
    try{
      const lit=(type==='money'||type==='number')?sqlNum(nv):sqlEsc(nv);
      await sb(`update ${table} set ${k}=${lit} where id='${id}'`);
      const stored=(type==='money'||type==='number')?(nv===''?null:Number(nv)):nv;
      render(nv); patchCache(table,id,k,stored); toast('Saved');
      if(['first_name','last_name','company_name'].includes(k)){
        const key=Object.keys(SCHEMA).find(kk=>SCHEMA[kk].table===table);
        const rec=state.cache[key]&&state.cache[key].find(x=>x.id===id);
        const nameEl=$('#drawer .detail-name');
        if(rec&&nameEl) nameEl.textContent=key==='buyers'?(rec.company_name||'(no name)'):(((rec.first_name||'')+' '+(rec.last_name||'')).trim()||'(no name)');
      }
    }catch(e){ render(raw); toast('Save failed: '+(e.message||e)); }
  };
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&type!=='textarea'){ e.preventDefault(); input.blur(); } else if(e.key==='Escape'){ done=true; render(raw); } });
  input.addEventListener('blur',()=>commit(true));
  if(type==='select') input.addEventListener('change',()=>input.blur());
}

function openLeadDetail(r){

  const raw=leadRaw(r); const q=raw.qualification||{}; const consent=raw.consent||{};
  const qa=Array.isArray(q.qa)?q.qa:null;
  const loc=[r.city,r.province].filter(Boolean).join(', ');
  const T='cc_leads';
  let info='<div class="info-card">';
  info+=infoRow('users','First name', ev(T,r.id,'first_name',r.first_name,'text'));
  info+=infoRow('users','Last name', ev(T,r.id,'last_name',r.last_name,'text'));

  info+=infoRow('pod','Phone', ev(T,r.id,'phone',r.phone,'text'));
  info+=infoRow('building','City', ev(T,r.id,'city',r.city,'text'));
  info+=infoRow('building','Province', ev(T,r.id,'province',r.province,'text'));
  info+=infoRow('target','Segment', ev(T,r.id,'segment',r.segment,'badge'));
  info+=infoRow('chart','Source', ev(T,r.id,'source',r.source,'select',optsOf('leads','source')));
  info+=infoRow('filter','Quality', ev(T,r.id,'quality',r.quality,'select',optsOf('leads','quality')));
  info+=infoRow('send','Status', ev(T,r.id,'status',r.status,'select',optsOf('leads','status')));
  info+=infoRow('pipeline','Sale price', ev(T,r.id,'price',r.price,'money'));
  if(q.outcome_key) info+=infoRow('workflow','Outcome', tag(String(q.outcome_key).replace(/_/g,' ')));
  if(q.score_band) info+=infoRow('chart','Score band', tag(String(q.score_band).replace(/_/g,' ')));
  info+=`<div class="info-note"><div class="il">${svg('note',16)}<span>Notes <span class="muted" style="font-weight:400">· quiz answers</span></span></div>${ev('cc_leads',r.id,'notes',r.notes,'textarea')}</div>`;

/* ---------- interaction history (activity log) ---------- */
const ACT_TYPES=[['note','Note'],['call','Call'],['email','Email'],['meeting','Meeting'],['sms','SMS']];
const ACT_LABEL={note:'Note',call:'Call',email:'Email',meeting:'Meeting',sms:'SMS'};
const ACT_COLOR={note:'gray',call:'blue',email:'purple',meeting:'orange',sms:'green',system:'gray'};
function toLocalInput(d){ const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
function fmtDateTime(ms){ if(!ms) return ''; const d=new Date(ms); if(isNaN(d)) return ''; return d.toLocaleString('en-CA',{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function activitySectionHtml(){
  return `<div class="detail-sec"><h4>Activity</h4>
    <div class="act-box">
      <div class="act-types" id="actTypes">${ACT_TYPES.map((t,i)=>`<button type="button" class="act-chip${i===0?' on':''}" data-t="${t[0]}">${htmlEsc(t[1])}</button>`).join('')}</div>
      <input class="act-subj" id="actSubj" placeholder="Subject (optional)">
      <textarea class="act-body" id="actBody" placeholder="What was discussed…"></textarea>
      <div class="act-row"><input type="datetime-local" id="actWhen" class="act-when"><button class="btn primary sm" id="actLog">Log interaction</button></div>
    </div>
    <div class="act-list" id="actList"><div class="muted" style="padding:8px 2px">Loading…</div></div>
  </div>`;
}
async function mountActivities(entityKey, record, sysEvents){
  const types=$('#actTypes'); if(!types) return;
  let curType='note';
  types.querySelectorAll('.act-chip').forEach(b=>b.onclick=()=>{ types.querySelectorAll('.act-chip').forEach(x=>x.classList.remove('on')); b.classList.add('on'); curType=b.dataset.t; });
  const whenEl=$('#actWhen'); if(whenEl) whenEl.value=toLocalInput(new Date());
  const list=$('#actList');
  const refresh=async()=>{
    let acts=[];
    try{ acts=await sb(`select id,type,subject,body,occurred_at from cc_activities where entity_type=${sqlEsc(entityKey)} and entity_id='${record.id}'::uuid order by occurred_at desc`); }
    catch(e){ list.innerHTML='<div class="muted" style="padding:8px 2px">Couldn’t load activity.</div>'; return; }
    const items=acts.map(a=>({t:new Date(a.occurred_at).getTime()||0,type:a.type,subject:a.subject,body:a.body,id:a.id,sys:false}))
      .concat((sysEvents||[]).filter(s=>s.when).map(s=>({t:new Date(s.when).getTime()||0,type:'system',subject:s.title,body:s.meta,sys:true})));
    items.sort((a,b)=>b.t-a.t);
    if(!items.length){ list.innerHTML='<div class="muted" style="padding:8px 2px">No activity yet — log a call, email, or note above.</div>'; return; }
    list.innerHTML='<div class="tl">'+items.map(it=>{
      const head=it.sys
        ? `<span class="tl-title">${htmlEsc(it.subject||'')}</span>`
        : `<span class="tl-title"><span class="act-badge t-${ACT_COLOR[it.type]||'gray'}">${htmlEsc(ACT_LABEL[it.type]||it.type)}</span>${it.subject?htmlEsc(it.subject):''}</span>`;
      const del=it.sys?'':`<button class="iconbtn act-del" data-id="${it.id}" title="Delete">${svg('trash',14)}</button>`;
      return `<div class="tl-item"><div class="tl-dot"></div><div style="display:flex;gap:8px">${`<div style="flex:1">${head}${it.body?`<div class="act-body-disp">${htmlEsc(it.body)}</div>`:''}<div class="tl-meta">${fmtDateTime(it.t)}</div></div>`}${del}</div></div>`;
    }).join('')+'</div>';
    list.querySelectorAll('.act-del').forEach(b=>b.onclick=async()=>{ if(!confirm('Delete this interaction?')) return; try{ await sb(`delete from cc_activities where id='${b.dataset.id}'`); toast('Deleted'); refresh(); }catch(e){ toast('Failed'); } });
  };
  const logBtn=$('#actLog');
  if(logBtn) logBtn.onclick=async()=>{
    const subj=$('#actSubj').value.trim(); const body=$('#actBody').value.trim();
    if(!subj && !body){ toast('Add a subject or note'); return; }
    const w=$('#actWhen').value; const whenLit=w?sqlEsc(new Date(w).toISOString()):'now()';
    logBtn.disabled=true;
    try{
      await sb(`insert into cc_activities (entity_type,entity_id,type,subject,body,occurred_at) values (${sqlEsc(entityKey)},'${record.id}'::uuid,${sqlEsc(curType)},${sqlEsc(subj)},${sqlEsc(body)},${whenLit})`);
      $('#actSubj').value=''; $('#actBody').value=''; toast('Logged'); await refresh();
    }catch(e){ toast('Failed: '+(e.message||e)); }
    logBtn.disabled=false;
  };
  await refresh();
}

async function loadEntity(key){
  const sc=SCHEMA[key];
  let sql;
  if(key==='distributions') sql=`select d.*, b.company_name buyer_name from cc_distributions d left join cc_buyers b on b.id=d.buyer_id order by d.created_at desc`;
  else if(key==='contacts') sql=`select c.*, co.name company_name from cc_contacts c left join cc_companies co on co.id=c.company_id order by c.created_at desc`;
  else sql=`select * from ${sc.table} order by created_at desc`;
  const rows=await sb(sql);
  state.cache[key]=rows; return rows;
}
async function renderEntity(c, key){
  const sc=SCHEMA[key];
  const rows=await loadEntity(key);
  state.tableSort=state.tableSort||{};
  // top action
  const add=el(`<button class="btn primary">${svg('plus',15)} New ${sc.title.replace(/s$/,'').toLowerCase()}</button>`);
  add.onclick=()=>openForm(key);
  $('#topActions').appendChild(add);
  c.innerHTML='';
  // toolbar
  const tb=el(`<div class="toolbar"></div>`);
  const search=el(`<input id="globalSearch" class="tinput" placeholder="Search ${sc.title.toLowerCase()}…">`);
  tb.appendChild(search);
  const countPill=el(`<span class="acct-pill">${rows.length} record${rows.length===1?'':'s'}</span>`);
  tb.appendChild(countPill);
  let lastData=rows;
  let selCount=null;
  const updateSel=()=>{ if(selCount) selCount.textContent = state.selected.size ? state.selected.size+' selected' : ''; };
  if(key==='leads'){
    const bar=el(`<div class="selbar"></div>`);
    const numInput=el(`<input class="selnum" type="number" min="1" placeholder="N" title="Select first N rows">`);
    const selBtn=el(`<button class="btn">Select first N</button>`);
    selBtn.onclick=()=>{ const n=parseInt(numInput.value,10)||0; if(n<=0){toast('Enter a number');return;} state.selected.clear(); lastData.slice(0,n).forEach(r=>state.selected.add(r.id)); draw(search.value); toast(`Selected ${Math.min(n,lastData.length)} lead${Math.min(n,lastData.length)===1?'':'s'}`); };
    const clr=el(`<button class="btn">Clear</button>`); clr.onclick=()=>{ state.selected.clear(); draw(search.value); };
    selCount=el(`<span class="selcount"></span>`);
    const eb=el(`<button class="btn">${svg('download',15)} Export selected (XLS)</button>`); eb.onclick=()=>exportLeads();
    const cp=el(`<button class="btn">${svg('copy',15)} Copy TSV</button>`); cp.onclick=()=>copyLeadsTSV();
    const ds=el(`<button class="btn">${svg('send',15)} Distribute</button>`); ds.onclick=()=>distributeLeads();
    bar.append(numInput,selBtn,clr,selCount,eb,cp,ds); tb.appendChild(bar);
  }
  c.appendChild(tb);
  const wrap=el('<div class="tablewrap"></div>');
  c.appendChild(wrap);
  function draw(filter=''){
    const f=(filter||'').toLowerCase();
    let data=rows.filter(r=>!f||Object.values(r).some(v=>String(v==null?'':v).toLowerCase().includes(f)));
    data=sortRows(key,sc,data);
    lastData=data;
    wrap.innerHTML=buildTable(key,sc,data);
    // wire row actions
    wrap.querySelectorAll('[data-edit]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();openForm(key,rows.find(r=>r.id===b.dataset.edit));});
    wrap.querySelectorAll('[data-del]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();delRecord(key,b.dataset.del);});
    // sortable headers
    wrap.querySelectorAll('th.sortable').forEach(th=>th.onclick=()=>{ const col=th.dataset.sortcol; const cur=state.tableSort[key]||{}; state.tableSort[key]={col, dir:(cur.col===col&&cur.dir==='asc')?'desc':'asc'}; draw(search.value); });
    if(key==='leads'){
      const ids=data.map(r=>r.id);
      const chks=[...wrap.querySelectorAll('.rowchk')];
      chks.forEach((ch,i)=>{
        ch.checked=state.selected.has(ch.dataset.id);
        ch.addEventListener('click',(e)=>{
          e.stopPropagation();
          const id=ch.dataset.id;
          if(e.shiftKey && draw._anchor!=null && draw._anchor<ids.length){
            const a=Math.min(draw._anchor,i), b=Math.max(draw._anchor,i);
            for(let j=a;j<=b;j++) state.selected.add(ids[j]);
            chks.forEach(x=>x.checked=state.selected.has(x.dataset.id));
          } else {
            ch.checked?state.selected.add(id):state.selected.delete(id);
            draw._anchor=i;
          }
          updateSel();
        });
      });
      const all=wrap.querySelector('.allchk');
      if(all){
        all.checked = ids.length>0 && ids.every(id=>state.selected.has(id));
        all.onclick=()=>{ if(all.checked){ ids.forEach(id=>state.selected.add(id)); } else { ids.forEach(id=>state.selected.delete(id)); } chks.forEach(x=>x.checked=state.selected.has(x.dataset.id)); updateSel(); };
      }
    }
    wrap.querySelectorAll('tr[data-row]').forEach(tr=>{ tr.onclick=(e)=>{ if(e.target.closest('.row-actions')||e.target.closest('.check')||e.target.tagName==='INPUT') return; const rec=rows.find(r=>r.id===tr.dataset.row); if(rec) openDetail(key,rec); }; });
    updateSel();
  }
  draw();
  search.oninput=()=>draw(search.value);
}
function buildTable(key,sc,rows){
  if(!rows.length) return `<div class="empty">${svg(sc.icon,34)}<div>No ${sc.title.toLowerCase()} yet</div></div>`;
  const cols=sc.columns; const P=PRIMARY[key];
  const srt=(state.tableSort||{})[key]||{};
  const arrow=(scol)=> srt.col===scol ? `<span class="arrow">${srt.dir==='desc'?'▼':'▲'}</span>` : '';
  let h='<table class="grid"><thead><tr>';
  if(key==='leads') h+='<th style="width:34px"><input type="checkbox" class="check allchk"></th>';
  if(P) h+=`<th class="sortable" data-sortcol="__primary">${htmlEsc(P.label)}${arrow('__primary')}</th>`;
  cols.forEach(col=>{ h+=`<th class="sortable" data-sortcol="${col}">${htmlEsc(labelFor(sc,col))}${arrow(col)}</th>`; });
  h+='<th style="width:70px"></th></tr></thead><tbody>';
  rows.forEach(r=>{
    h+=`<tr data-row="${r.id}" style="cursor:pointer">`;
    if(key==='leads') h+=`<td><input type="checkbox" class="check rowchk" data-id="${r.id}"></td>`;
    if(P){ const nm=P.name(r), sub=P.sub(r); h+=`<td><div class="cellname">${avatarHtml(nm,P.email(r),28)}<div style="min-width:0"><div class="nm">${htmlEsc(nm)}</div>${sub?`<div class="sb">${htmlEsc(sub)}</div>`:''}</div></div></td>`; }
    cols.forEach(col=>{ h+=`<td>${cellVal(sc,col,r)}</td>`; });
    h+=`<td><div class="row-actions"><button class="iconbtn" data-edit="${r.id}" title="Edit">${svg('edit',15)}</button><button class="iconbtn" data-del="${r.id}" title="Delete">${svg('trash',15)}</button></div></td>`;
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}
function sortRows(key,sc,rows){
  const srt=(state.tableSort||{})[key]; if(!srt||!srt.col) return rows;
  const P=PRIMARY[key];
  const getv=(r)=> srt.col==='__primary' ? (P?P.name(r):'') : r[srt.col];
  const f=sc.fields.find(x=>x.k===srt.col);
  const isNum=f&&f.type==='number';
  const isDate=srt.col==='created_at'||(f&&f.type==='date');
  const dir=srt.dir==='desc'?-1:1;
  return rows.slice().sort((a,b)=>{
    let x=getv(a), y=getv(b);
    const xe=(x==null||x===''), ye=(y==null||y==='');
    if(xe&&ye) return 0; if(xe) return 1; if(ye) return -1;   // blanks always last
    if(isDate){ x=new Date(x).getTime()||0; y=new Date(y).getTime()||0; return dir*(x-y); }
    if(isNum){ return dir*((Number(x)||0)-(Number(y)||0)); }
    return dir*String(x).toLowerCase().localeCompare(String(y).toLowerCase());
  });
}
function labelFor(sc,col){
  if(col==='buyer_name') return 'Buyer';
  if(col==='company_name') return 'Company';
  const f=sc.fields.find(f=>f.k===col); return f?f.l:col.replace(/_/g,' ');
}
function cellVal(sc,col,r){
  const f=sc.fields.find(f=>f.k===col);
  let v=r[col];
  if(col==='buyer_name'||col==='company_name') return v?htmlEsc(v):'<span class="muted">—</span>';
  if(col==='segment') return v?tag(v):'<span class="muted">—</span>';
  if(f&&f.badge) return tag(v);
  if(f&&f.type==='number'&&(col.includes('price')||col.includes('amount'))) return v!=null?fmtMoney(v):'<span class="muted">—</span>';
  if(col==='created_at'||f&&f.type==='date') return v?`<span class="muted">${fmtDate(v)}</span>`:'<span class="muted">—</span>';
  return v!=null&&v!==''?htmlEsc(v):'<span class="muted">—</span>';
}

async function openForm(key, record){
  const sc=SCHEMA[key];
  const editing=!!record;
  for(const f of sc.fields){ if(f.type==='fk' && !state.cache[f.fk]) await loadEntity(f.fk); }
  const wantAvatar=['leads','buyers','contacts'].includes(key);
  let body=wantAvatar?'<div class="av-prev" id="avPrev"></div>':'';
  body+='<div class="form-col">';
  sc.fields.forEach(f=>{
    const val=record?(record[f.k]==null?'':record[f.k]):'';
    body+=`<div class="field"><label>${htmlEsc(f.l)}${f.req?' *':''}</label>`;
    if(f.type==='select'){
      body+=`<select data-k="${f.k}"><option value="">—</option>`+f.options.map(o=>`<option ${String(val)===o?'selected':''}>${htmlEsc(o)}</option>`).join('')+'</select>';
    } else if(f.type==='fk'){
      const opts=(state.cache[f.fk]||[]); const nameKey=f.fk==='buyers'?'company_name':'name';
      body+=`<select data-k="${f.k}"><option value="">—</option>`+opts.map(o=>`<option value="${o.id}" ${String(val)===String(o.id)?'selected':''}>${htmlEsc(o[nameKey]||o.id)}</option>`).join('')+'</select>';
    } else if(f.type==='textarea'){
      body+=`<textarea data-k="${f.k}">${htmlEsc(val)}</textarea>`;
    } else {
      const t=f.type==='number'?'number':(f.type==='date'?'date':'text');
      body+=`<input type="${t}" data-k="${f.k}" value="${htmlEsc(val)}">`;
    }
    body+='</div>';
  });
  body+='</div>';
  const title=(editing?'Edit ':'Creating new ')+sc.title.replace(/s$/,'').toLowerCase();
  const foot=`<button class="btn" id="cancel">Cancel</button><button class="btn primary" id="save">${editing?'Save changes':'Save'}</button>`;
  const panel=openDrawer(title, body, foot);
  panel.querySelector('#cancel').onclick=closeDrawer;
  if(wantAvatar){
    const prev=panel.querySelector('#avPrev');
    const nameKeys=key==='buyers'?['company_name','contact_name']:['first_name','last_name'];
    const getName=()=>nameKeys.map(k=>{const i=panel.querySelector(`[data-k="${k}"]`);return i?i.value:'';}).filter(Boolean).join(' ').trim();
    const getEmail=()=>{const i=panel.querySelector('[data-k="email"]');return i?i.value:'';};
    const refresh=()=>{ prev.innerHTML=avatarHtml(getName()||'New', getEmail(), 72); };
    refresh();
    ['email','first_name','last_name','company_name','contact_name'].forEach(k=>{const i=panel.querySelector(`[data-k="${k}"]`); if(i) i.addEventListener('input',refresh);});
  }
  panel.querySelector('#save').onclick=async()=>{
    const vals={};
    panel.querySelectorAll('[data-k]').forEach(inp=>{ vals[inp.dataset.k]=inp.value; });
    const numKeys=sc.fields.filter(f=>f.type==='number').map(f=>f.k);
    const fkKeys=sc.fields.filter(f=>f.type==='fk').map(f=>f.k);
    const cols=[],setParts=[];
    Object.keys(vals).forEach(kk=>{
      const isNum=numKeys.includes(kk); const isFk=fkKeys.includes(kk); const raw=vals[kk];
      const lit=(isNum)?sqlNum(raw):(isFk?(raw?`'${raw}'::uuid`:'NULL'):sqlEsc(raw));
      cols.push([kk,lit]); setParts.push(`${kk}=${lit}`);
    });
    try{
      panel.querySelector('#save').disabled=true;
      if(editing) await sb(`update ${sc.table} set ${setParts.join(', ')} where id='${record.id}'`);
      else await sb(`insert into ${sc.table} (${cols.map(c=>c[0]).join(',')}) values (${cols.map(c=>c[1]).join(',')})`);
      closeDrawer(); toast(editing?'Saved':'Created'); state.adsData=null; renderView();
    }catch(e){ alert('Save failed: '+(e.message||e)); panel.querySelector('#save').disabled=false; }
  };
}

function selectedLeads(){
  const all=state.cache.leads||[];
  return all.filter(r=>state.selected.has(r.id));
}
const LEAD_EXPORT_COLS=['first_name','last_name','email','phone','city','province','age','segment','product_interest','quality','status','source','campaign','created_at'];
function exportLeads(){
  let sel=selectedLeads(); if(!sel.length) sel=state.cache.leads||[];
  if(!sel.length){ toast('No leads to export'); return; }
  const headers=LEAD_EXPORT_COLS.map(c=>c.replace(/_/g,' '));
  let html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1"><tr>'+headers.map(h=>`<th>${htmlEsc(h)}</th>`).join('')+'</tr>';
  sel.forEach(r=>{ html+='<tr>'+LEAD_EXPORT_COLS.map(c=>`<td>${htmlEsc(c==='created_at'?fmtDate(r[c]):(r[c]==null?'':r[c]))}</td>`).join('')+'</tr>'; });
  html+='</table></body></html>';
  const blob=new Blob([html],{type:'application/vnd.ms-excel'});
  const ok=triggerDownload(blob,`leads-export-${new Date().toISOString().slice(0,10)}.xls`);
  toast(ok?`Exporting ${sel.length} leads…`:'Download blocked — use Copy TSV');
}
function copyLeadsTSV(){
  let sel=selectedLeads(); if(!sel.length) sel=state.cache.leads||[];
  if(!sel.length){ toast('No leads'); return; }
  const headers=LEAD_EXPORT_COLS.map(c=>c.replace(/_/g,' '));
  let tsv=headers.join('\t')+'\n';
  sel.forEach(r=>{ tsv+=LEAD_EXPORT_COLS.map(c=>String(c==='created_at'?fmtDate(r[c]):(r[c]==null?'':r[c])).replace(/[\t\n]/g,' ')).join('\t')+'\n'; });
  navigator.clipboard.writeText(tsv).then(()=>toast(`Copied ${sel.length} leads as TSV — paste into Excel`),()=>toast('Copy failed'));
}
function triggerDownload(blob,name){
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name; a.rel='noopener'; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},2000);
    return true;
  }catch(e){
    console.warn('download anchor failed, trying window.open',e);
    try{ const url=URL.createObjectURL(blob); const w=window.open(url,'_blank'); return !!w; }
    catch(e2){ console.warn(e2); return false; }
  }
}

    });

  });

    ${kpi('chart','Total spend',fmtMoney(tSpend),state.adsRange.replace('last_','last ').replace('d',' days'))}
    ${kpi('target','Impressions',fmtInt(tImp),'')}
    ${kpi('send','Clicks',fmtInt(tClicks),'')}
    ${kpi('pipeline','Avg CPC',fmtMoney(avgCpc),'')}
    ${kpi('chart','Avg CTR',avgCtr.toFixed(2)+'%','')}
    ${kpi('users','Reach',fmtInt(tReach),'')}
  </div>`));

  // chart: spend by account
  const cp=el(`<div class="panel"><div class="section-title">${svg('chart',15)} Spend by ad account</div><div class="chart-box"><canvas id="adsChart"></canvas></div></div>`);
  c.appendChild(cp);
  // account summary pills + errors
  acctRows.forEach(a=>{ if(a.error){ c.appendChild(el(`<div class="banner">⚠ <div><b>${htmlEsc(a.name)}</b> couldn't be queried: ${htmlEsc(a.error)}</div></div>`)); } });

  // campaign breakdown table
  allCampaigns.sort((a,b)=>b.spend-a.spend);
  const tp=el(`<div class="panel"><div class="section-title">${svg('target',15)} Campaign breakdown</div></div>`);
  if(allCampaigns.length){
    let h='<div class="tablewrap"><table class="grid"><thead><tr><th>Campaign</th><th>Account</th><th>Status</th><th>Spend</th><th>Impr.</th><th>Clicks</th><th>CTR</th><th>CPC</th></tr></thead><tbody>';
    allCampaigns.forEach(cm=>{ h+=`<tr><td style="white-space:normal;max-width:320px">${htmlEsc(cm.name)}</td><td><span class="acct-pill">${htmlEsc(cm.account)}</span></td><td>${tag((cm.status||'').toLowerCase()==='active'?'active':(cm.status||'').toLowerCase())}</td><td>${fmtMoney(cm.spend)}</td><td>${fmtInt(cm.imp)}</td><td>${fmtInt(cm.clk)}</td><td>${cm.ctr.toFixed(2)}%</td><td>${fmtMoney(cm.cpc)}</td></tr>`; });
    h+='</tbody></table></div>';
    tp.appendChild(el(h));
  } else tp.appendChild(el('<div class="muted">No campaign spend in this window.</div>'));
  c.appendChild(tp);

  // draw chart
  setTimeout(()=>{
    const ctx=$('#adsChart'); if(!ctx||!window.Chart) return;
    new Chart(ctx,{type:'bar',data:{labels:acctRows.map(a=>a.name),datasets:[{label:'Spend (CAD)',data:acctRows.map(a=>a.spend),backgroundColor:'#3E63DD',borderRadius:6,maxBarThickness:60}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtMoney(c.raw)}}},scales:{y:{beginAtZero:true,grid:{color:'#F1F1F1'},ticks:{color:'#999',callback:v=>'$'+v}},x:{grid:{display:false},ticks:{color:'#666'}}}}});
  },60);
}

/* ============================================================
   TASKS
   ============================================================ */
async function renderTasks(c){
  const rows=await sb(`select * from cc_tasks order by case priority when 'high' then 0 when 'medium' then 1 else 2 end, due_date nulls last, created_at desc`);
  state.cache.tasks=rows;
  const add=el(`<button class="btn primary">${svg('plus',15)} New task</button>`); add.onclick=()=>openForm('tasks');
  $('#topActions').appendChild(add);
  c.innerHTML='';
  c.appendChild(el(`<div class="muted" style="font-size:12.5px;margin-bottom:10px">Drag a card between columns to change its status, or use <b>+ Add</b> on any column for a quick task.</div>`));
  const COLS=[['todo','To do'],['in_progress','In progress'],['done','Done']];
  const groups={todo:[],in_progress:[],done:[]};
  rows.forEach(r=>(groups[r.status]||groups.todo).push(r));
  const board=el('<div class="kanban"></div>');
  COLS.forEach(([st,lbl])=>{
    const col=el(`<div class="kcol" data-st="${st}"><div class="kcol-h"><span>${tag(st)}</span><span class="muted">${groups[st].length}</span></div></div>`);
    const body=el('<div class="kbody"></div>');
    groups[st].forEach(t=>{
      const card=el(`<div class="kcard ${st==='done'?'done':''}" draggable="true" data-id="${t.id}">
        <button class="iconbtn kdel" title="Delete">${svg('trash',14)}</button>
        <div class="nm">${htmlEsc(t.title)}</div>
        ${t.body?`<div class="muted" style="font-size:12px;margin-top:3px">${htmlEsc(t.body)}</div>`:''}
        <div class="kmeta">${tag(t.priority||'low')}${t.due_date?`<span class="acct-pill">${fmtDate(t.due_date)}</span>`:''}${t.related_to?`<span class="muted" style="font-size:11.5px">${htmlEsc(t.related_to)}</span>`:''}</div>
      </div>`);
      card.querySelector('.kdel').onclick=(e)=>{ e.stopPropagation(); delRecord('tasks',t.id); };
      card.addEventListener('click',(e)=>{ if(e.target.closest('.kdel')) return; openForm('tasks',t); });
      card.addEventListener('dragstart',(e)=>{ e.dataTransfer.setData('text/plain',t.id); e.dataTransfer.effectAllowed='move'; card.classList.add('dragging'); });
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
      body.appendChild(card);
    });
    const addBtn=el(`<button class="kcol-add">${svg('plus',14)} Add</button>`);
    addBtn.onclick=()=>{
      if(col.querySelector('.kquick')) { col.querySelector('.kquick').focus(); return; }
      const inp=el(`<input class="kquick" placeholder="Task title… (Enter to save, Esc to cancel)">`);
      body.insertBefore(inp,body.firstChild); inp.focus();
      let saving=false;
      const save=async()=>{ if(saving) return; const v=inp.value.trim(); if(!v){ inp.remove(); return; } saving=true; inp.disabled=true; try{ await sb(`insert into cc_tasks (title,status,priority) values (${sqlEsc(v)},${sqlEsc(st)},'medium')`); renderView(); }catch(e){ toast('Failed to add'); inp.disabled=false; saving=false; } };
      inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); save(); } else if(e.key==='Escape'){ inp.remove(); } });
      inp.addEventListener('blur',()=>{ if(inp.value.trim()) save(); else inp.remove(); });
    };
    col.addEventListener('dragover',(e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; col.classList.add('drop'); });
    col.addEventListener('dragleave',(e)=>{ if(!col.contains(e.relatedTarget)) col.classList.remove('drop'); });
    col.addEventListener('drop',async(e)=>{ e.preventDefault(); col.classList.remove('drop'); const id=e.dataTransfer.getData('text/plain'); if(!id) return; const cur=(state.cache.tasks||[]).find(x=>x.id===id); if(cur&&cur.status===st) return; try{ await sb(`update cc_tasks set status=${sqlEsc(st)} where id='${id}'`); renderView(); }catch(err){ toast('Move failed'); } });
    col.appendChild(body); col.appendChild(addBtn); board.appendChild(col);
  });
  c.appendChild(board);
}

async function renderWorkflows(c){
  const rows=await sb(`select * from cc_workflows order by created_at desc`);
  const add=el(`<button class="btn primary">${svg('plus',15)} New workflow</button>`); add.onclick=()=>openWorkflowForm();
  $('#topActions').appendChild(add);
  c.innerHTML='';
  c.appendChild(el(`<div class="banner">⚙ <div>Workflows here are a visual map of your automation (e.g. the n8n quiz→lead pipeline). Execution still runs in n8n; this is your blueprint + status board.</div></div>`));
  if(!rows.length) c.appendChild(el(`<div class="empty">${svg('workflow',34)}<div>No workflows yet</div></div>`));
  rows.forEach(w=>{
    let steps=[]; try{ steps=Array.isArray(w.steps)?w.steps:JSON.parse(w.steps||'[]'); }catch(e){ steps=[]; }
    const card=el(`<div class="wf"><div class="wf-h">${svg('workflow',16)}<b>${htmlEsc(w.name)}</b>${tag(w.status)}<div style="flex:1"></div><button class="iconbtn" title="Edit">${svg('edit',15)}</button><button class="iconbtn" title="Delete">${svg('trash',15)}</button></div>${w.description?`<div class="muted" style="font-size:12.5px">${htmlEsc(w.description)}</div>`:''}${w.trigger?`<div style="margin-top:8px;font-size:12px"><span class="muted">Trigger:</span> ${tag(w.trigger)}</div>`:''}</div>`);
    if(steps.length){
      const sc=el('<div class="wf-steps"></div>');
      steps.forEach((s,i)=>{ sc.appendChild(el(`<div class="wf-step">${htmlEsc(s.step||s)}</div>`)); if(i<steps.length-1) sc.appendChild(el('<span class="wf-arrow">→</span>')); });
      card.appendChild(sc);
    }
    const btns=card.querySelectorAll('.iconbtn');
    btns[0].onclick=()=>openWorkflowForm(w); btns[1].onclick=()=>delRecord('workflows',w.id);
    c.appendChild(card);
  });
}
SCHEMA.workflows={table:'cc_workflows'};
async function openWorkflowForm(record){
  const r=record||{};
  let stepsText=''; try{ const st=Array.isArray(r.steps)?r.steps:JSON.parse(r.steps||'[]'); stepsText=st.map(s=>s.step||s).join('\n'); }catch(e){}
  const m=el(`<div class="overlay"><div class="modal">
    <div class="modal-h">${record?'Edit workflow':'New workflow'}<button class="iconbtn" id="x">✕</button></div>
    <div class="modal-b"><div class="fgrid">
      <div class="field full"><label>Name *</label><input id="f_name" value="${htmlEsc(r.name||'')}"></div>
      <div class="field"><label>Status</label><select id="f_status"><option ${r.status==='draft'?'selected':''}>draft</option><option ${r.status==='active'?'selected':''}>active</option><option ${r.status==='paused'?'selected':''}>paused</option></select></div>
      <div class="field"><label>Trigger</label><input id="f_trigger" value="${htmlEsc(r.trigger||'')}"></div>
      <div class="field full"><label>Description</label><textarea id="f_desc">${htmlEsc(r.description||'')}</textarea></div>
      <div class="field full"><label>Steps (one per line)</label><textarea id="f_steps">${htmlEsc(stepsText)}</textarea></div>
    </div></div>
    <div class="modal-f"><button class="btn" id="cancel">Cancel</button><button class="btn primary" id="save">${record?'Save':'Create'}</button></div>
  </div></div>`);
  $('#modalRoot').appendChild(m);
  const close=()=>m.remove();
  m.querySelector('#cancel').onclick=close; m.querySelector('#x').onclick=close; m.onclick=e=>{if(e.target===m)close();};
  m.querySelector('#save').onclick=async()=>{
    const name=m.querySelector('#f_name').value.trim(); if(!name){alert('Name required');return;}
    const steps=m.querySelector('#f_steps').value.split('\n').map(s=>s.trim()).filter(Boolean).map(s=>({step:s}));
    const stepsJson=sqlEsc(JSON.stringify(steps));
    try{
      if(record) await sb(`update cc_workflows set name=${sqlEsc(name)},status=${sqlEsc(m.querySelector('#f_status').value)},trigger=${sqlEsc(m.querySelector('#f_trigger').value)},description=${sqlEsc(m.querySelector('#f_desc').value)},steps=${stepsJson}::jsonb where id='${record.id}'`);
      else await sb(`insert into cc_workflows (name,status,trigger,description,steps) values (${sqlEsc(name)},${sqlEsc(m.querySelector('#f_status').value)},${sqlEsc(m.querySelector('#f_trigger').value)},${sqlEsc(m.querySelector('#f_desc').value)},${stepsJson}::jsonb)`);
      close(); toast(record?'Saved':'Created'); renderView();
    }catch(e){ alert('Save failed: '+(e.message||e)); }
  };
}
